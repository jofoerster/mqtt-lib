name: Rust CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read

# Cancel in-progress runs when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Check code formatting
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # Lint code with clippy
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Run clippy
        # Note: We exclude embedded-single-core feature as it only works on embedded targets
        run: cargo clippy --all-targets --workspace --features opentelemetry -- -D warnings

  # Build and test
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Generate test certificates
        run: |
          chmod +x scripts/generate_test_certs.sh
          ./scripts/generate_test_certs.sh
      
      - name: Setup Test Environment
        run: |
          # We are the broker now! No need for external MQTT brokers
          # Our tests use our own broker implementation or mock clients
          echo "MQTT broker implementation ready for testing"
          echo "Tests will use our built-in broker or mock clients as needed"
      
      - name: Install cargo-make
        run: cargo install --force cargo-make
      
      - name: Build
        run: cargo make build
      
      - name: Run unit tests
        run: cargo make test-fast

      - name: Run QUIC integration tests
        run: cargo make test-quic
        
      - name: Build and test CLI
        run: |
          echo "🚀 Building and testing our mqttv5 CLI..."
          cargo make build-cli
          
          # Test CLI help works
          ./target/release/mqttv5 --help
          ./target/release/mqttv5 pub --help
          ./target/release/mqttv5 sub --help  
          ./target/release/mqttv5 broker --help
          
          echo "✅ CLI help tests passed"
          
          # Run CLI functionality tests
          cargo make test-cli
          
          echo "🎉 CLI validation completed successfully!"

  # Test with minimal supported Rust version
  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Generate test certificates
        run: |
          chmod +x scripts/generate_test_certs.sh
          ./scripts/generate_test_certs.sh
      - name: Check MSRV
        # Note: We exclude embedded-single-core feature as it only works on embedded targets
        run: cargo check --workspace

  # Build documentation
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Build documentation
        # Note: We exclude embedded-single-core feature as it only works on embedded targets
        run: cargo doc --no-deps --workspace
        env:
          RUSTDOCFLAGS: -D warnings

  # Build and check WASM
  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Check WASM compilation
        run: cargo check --target wasm32-unknown-unknown --all-features -p mqtt5-wasm

      - name: Build WASM package
        run: |
          cd crates/mqtt5-wasm
          wasm-pack build --target web --features client,broker

      - name: Verify WASM output
        run: |
          ls -lh crates/mqtt5-wasm/pkg/
          echo "✅ WASM package built successfully"

  # Build for embedded targets (no_std)
  embedded:
    name: Embedded Targets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf,riscv32imac-unknown-none-elf,riscv32imc-unknown-none-elf

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build for ARM Cortex-M4
        run: cargo build -p mqtt5-protocol --target thumbv7em-none-eabihf --no-default-features

      - name: Build for RISC-V (with atomics)
        run: cargo build -p mqtt5-protocol --target riscv32imac-unknown-none-elf --no-default-features

      - name: Verify no_std builds
        run: echo "✅ All embedded targets built successfully"