# Mosquitto 2.x — popular open-source MQTT broker.
# Supports TCP, TLS, and WebSocket. No enhanced auth or ACL in default config.
# Topic alias maximum and receive maximum are lower than protocol defaults.

name = "mosquitto-2.x"
address = "mqtt://127.0.0.1:1883"
tls_address = "mqtts://127.0.0.1:8883"
ws_address = "ws://127.0.0.1:8080/mqtt"

[capabilities]
max_qos = 2
retain_available = true
wildcard_subscription_available = true
subscription_identifier_available = true
shared_subscription_available = true
topic_alias_maximum = 10
server_receive_maximum = 20
maximum_packet_size = 268435456
assigned_client_id_supported = true
auth_failure_uses_disconnect = false
injected_user_properties = []

[capabilities.transports]
tcp = true
tls = true
websocket = true
quic = false

[capabilities.enhanced_auth]
methods = []

[hooks]
restart_command = "systemctl restart mosquitto"
cleanup_command = ""
